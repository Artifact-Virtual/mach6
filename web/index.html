<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mach6</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #18181b;
  --bg-secondary: #27272a;
  --bg-tertiary: #3f3f46;
  --bg-hover: #3f3f4620;
  --text-primary: #fafafa;
  --text-secondary: #a1a1aa;
  --text-tertiary: #71717a;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-dim: #6366f120;
  --border: #27272a;
  --border-light: #3f3f46;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --orange: #f97316;
  --code-bg: #1e1e22;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-width: 280px;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  --transition: 150ms ease;
}

html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ─────────────────────────────────────────────────── */
.app { display: flex; height: 100vh; }

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-primary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: transform var(--transition);
}
.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 24px; height: 24px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
}
.sidebar-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 32px; height: 32px;
  border: none; background: transparent;
  color: var(--text-secondary);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all var(--transition);
}
.icon-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }

.session-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 2px;
  transition: background var(--transition);
}
.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--accent-dim); }
.session-item-name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-item-preview {
  font-size: 12px;
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.session-item-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
  display: flex;
  gap: 8px;
}
.session-item .delete-btn {
  display: none;
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 24px; height: 24px;
  border: none; background: var(--bg-tertiary);
  color: var(--text-secondary);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  align-items: center; justify-content: center;
}
.session-item { position: relative; }
.session-item:hover .delete-btn { display: flex; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.new-session-btn {
  width: 100%;
  padding: 8px 12px;
  border: 1px dashed var(--border-light);
  background: transparent;
  color: var(--text-secondary);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition);
  font-family: var(--font-sans);
}
.new-session-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

/* ── Main ───────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 49px;
}
.chat-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.chat-header-actions { display: flex; gap: 4px; }

/* ── Messages ───────────────────────────────────────────────── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0;
}
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }

.message {
  padding: 8px 20px;
  max-width: 100%;
}
.message + .message { margin-top: 4px; }

.message-wrapper {
  max-width: 800px;
  margin: 0 auto;
}

.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.message-role {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.message-role.user { color: var(--accent); }
.message-role.assistant { color: var(--green); }
.message-role.system { color: var(--yellow); }
.message-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: auto;
  display: flex;
  gap: 12px;
}

.message-content {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-primary);
}
.message-content p { margin-bottom: 8px; }
.message-content p:last-child { margin-bottom: 0; }
.message-content strong { font-weight: 600; }
.message-content em { font-style: italic; }
.message-content code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--orange);
}
.message-content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 10px 0;
  overflow-x: auto;
  position: relative;
}
.message-content pre code {
  background: none;
  padding: 0;
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.5;
}
.code-lang {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.message-content blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 14px;
  margin: 8px 0;
  color: var(--text-secondary);
}
.message-content ul, .message-content ol {
  padding-left: 20px;
  margin: 6px 0;
}
.message-content li { margin: 3px 0; }
.message-content h1, .message-content h2, .message-content h3 {
  margin: 16px 0 8px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.message-content h3 { font-size: 15px; }
.message-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}

/* ── Tool Calls ─────────────────────────────────────────────── */
.tool-call {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 8px 0;
  overflow: hidden;
}
.tool-call-header {
  padding: 8px 12px;
  background: var(--bg-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 13px;
  user-select: none;
}
.tool-call-header:hover { background: var(--bg-tertiary); }
.tool-call-icon { width: 18px; text-align: center; }
.tool-call-name { font-weight: 600; font-family: var(--font-mono); font-size: 12px; }
.tool-call-status {
  margin-left: auto;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.tool-call-status.running { color: var(--yellow); }
.tool-call-status.done { color: var(--green); }
.tool-call-status.error { color: var(--red); }

.tool-call-body {
  display: none;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  background: var(--code-bg);
}
.tool-call.expanded .tool-call-body { display: block; }
.tool-call-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.tool-call-output { margin-top: 8px; }
.tool-call-output pre {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Generative UI Cards */
.gen-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 8px 0;
  overflow: hidden;
}
.gen-card-file .gen-card-header { border-left: 3px solid var(--accent); }
.gen-card-exec .gen-card-header { border-left: 3px solid var(--green); }
.gen-card-exec.error .gen-card-header { border-left-color: var(--red); }
.gen-card-fetch .gen-card-header { border-left: 3px solid var(--yellow); }
.gen-card-header {
  padding: 8px 12px;
  background: var(--bg-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.gen-card-body {
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--code-bg);
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
}

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--bg-tertiary);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block;
}

/* ── Input ──────────────────────────────────────────────────── */
.input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.input-wrapper {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}
.chat-input {
  width: 100%;
  padding: 12px 48px 12px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  outline: none;
  transition: border-color var(--transition);
  min-height: 44px;
  max-height: 200px;
}
.chat-input::placeholder { color: var(--text-tertiary); }
.chat-input:focus { border-color: var(--accent); }
.send-btn {
  position: absolute;
  right: 8px;
  bottom: 8px;
  width: 32px; height: 32px;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: background var(--transition);
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Status Bar ─────────────────────────────────────────────── */
.status-bar {
  padding: 6px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 16px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
.status-dot.connected { background: var(--green); }
.status-dot.disconnected { background: var(--red); }

/* ── Config Panel ───────────────────────────────────────────── */
.config-panel {
  position: fixed;
  top: 0; right: -400px;
  width: 400px;
  height: 100vh;
  background: var(--bg-primary);
  border-left: 1px solid var(--border);
  z-index: 100;
  transition: right 200ms ease;
  display: flex;
  flex-direction: column;
}
.config-panel.open { right: 0; }
.config-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99;
  display: none;
}
.config-overlay.open { display: block; }

.config-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 600;
  font-size: 15px;
}
.config-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.config-section { margin-bottom: 24px; }
.config-section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  font-weight: 600;
}
.config-field { margin-bottom: 16px; }
.config-label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
}
.config-input, .config-select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition);
}
.config-input:focus, .config-select:focus { border-color: var(--accent); }
.config-select { cursor: pointer; }
.config-select option { background: var(--bg-secondary); }

.config-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 4px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  outline: none;
}
.config-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}
.slider-value {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-family: var(--font-mono);
}

.key-field { position: relative; }
.key-toggle {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 12px;
}

.save-btn {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: background var(--transition);
}
.save-btn:hover { background: var(--accent-hover); }

/* ── Agents Tab ─────────────────────────────────────────────── */
.agent-item {
  padding: 10px 12px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.agent-info { flex: 1; }
.agent-label { font-size: 13px; font-weight: 500; }
.agent-status { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.kill-btn {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-sans);
}
.kill-btn:hover { background: var(--red); color: white; }

/* ── New Session Modal ──────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 420px;
  max-width: 90vw;
}
.modal-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
}
.modal textarea {
  width: 100%;
  min-height: 80px;
  padding: 10px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  outline: none;
  resize: vertical;
  margin-top: 8px;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
}
.modal-btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-sans);
  border: none;
}
.modal-btn.primary { background: var(--accent); color: white; }
.modal-btn.primary:hover { background: var(--accent-hover); }
.modal-btn.secondary { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border-light); }
.modal-btn.secondary:hover { background: var(--bg-tertiary); }

/* ── Animations ─────────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.message { animation: fadeIn 200ms ease; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.streaming-cursor {
  display: inline-block;
  width: 2px;
  height: 16px;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: pulse 0.8s infinite;
}

/* ── Empty State ────────────────────────────────────────────── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  gap: 12px;
}
.empty-state-icon { font-size: 48px; opacity: 0.3; }
.empty-state-text { font-size: 15px; }
.empty-state-hint { font-size: 12px; }

/* ── Tabs ───────────────────────────────────────────────────── */
.config-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.config-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font-sans);
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
}
.config-tab:hover { color: var(--text-secondary); }
.config-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Scrollbar ──────────────────────────────────────────────── */
* { scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent; }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-icon">M6</div> Mach6</div>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="openConfig()" title="Settings">⚙</button>
      </div>
    </div>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer">
      <button class="new-session-btn" onclick="openNewSession()">+ New Session</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chat-header">
      <div class="chat-title" id="chatTitle">Mach6</div>
      <div class="chat-header-actions">
        <button class="icon-btn" onclick="openConfig()" title="Settings">⚙</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">⚡</div>
        <div class="empty-state-text">Welcome to Mach6</div>
        <div class="empty-state-hint">Start typing to begin a conversation</div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="chat-input" id="chatInput" placeholder="Message Mach6..." rows="1"
          onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">↑</button>
      </div>
    </div>
    <div class="status-bar" id="statusBar">
      <span><span class="status-dot disconnected" id="statusDot"></span> <span id="statusText">Connecting...</span></span>
      <span id="statusModel">—</span>
      <span id="statusMessages">0 messages</span>
      <span id="statusUptime">—</span>
    </div>
  </main>
</div>

<!-- Config Panel -->
<div class="config-overlay" id="configOverlay" onclick="closeConfig()"></div>
<div class="config-panel" id="configPanel">
  <div class="config-header">
    <span>Settings</span>
    <button class="icon-btn" onclick="closeConfig()">✕</button>
  </div>
  <div class="config-tabs">
    <button class="config-tab active" onclick="switchConfigTab('config', this)">Config</button>
    <button class="config-tab" onclick="switchConfigTab('agents', this)">Agents</button>
    <button class="config-tab" onclick="switchConfigTab('tools', this)">Tools</button>
  </div>
  <div class="config-body" id="configBody"></div>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="newSessionModal">
  <div class="modal">
    <div class="modal-title">New Session</div>
    <div class="config-field">
      <label class="config-label">Name</label>
      <input class="config-input" id="newSessionName" placeholder="Session name..." />
    </div>
    <div class="config-field">
      <label class="config-label">System Prompt (optional)</label>
      <textarea id="newSessionPrompt" placeholder="You are a helpful assistant..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeNewSession()">Cancel</button>
      <button class="modal-btn primary" onclick="createSession()">Create</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
const API = window.location.origin;
let sessions = [];
let currentSessionId = null;
let isStreaming = false;
let statusPollInterval = null;
let configData = {};
let providers = [];
let tools = [];
let agents = [];

// ── Init ───────────────────────────────────────────────────────
async function init() {
  try {
    const [sessRes, statusRes, provRes, toolRes] = await Promise.all([
      fetch(API + '/api/sessions'),
      fetch(API + '/api/status'),
      fetch(API + '/api/providers'),
      fetch(API + '/api/tools'),
    ]);
    sessions = await sessRes.json();
    const status = await statusRes.json();
    providers = await provRes.json();
    tools = await toolRes.json();

    updateStatus(status);
    renderSessions();

    if (sessions.length > 0) {
      selectSession(sessions[0].id);
    }

    // Poll status
    statusPollInterval = setInterval(pollStatus, 5000);

    // Load config
    const cfgRes = await fetch(API + '/api/config');
    configData = await cfgRes.json();

    setConnected(true);
  } catch (e) {
    console.error('Init failed:', e);
    setConnected(false);
  }
}

function setConnected(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
  text.textContent = connected ? 'Connected' : 'Disconnected';
}

async function pollStatus() {
  try {
    const res = await fetch(API + '/api/status');
    const status = await res.json();
    updateStatus(status);
    setConnected(true);
  } catch {
    setConnected(false);
  }
}

function updateStatus(status) {
  document.getElementById('statusModel').textContent = status.model || '—';
  document.getElementById('statusUptime').textContent = status.uptimeHuman || '—';
}

// ── Sessions ───────────────────────────────────────────────────
function renderSessions() {
  const el = document.getElementById('sessionList');
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}"
         onclick="selectSession('${s.id}')">
      <div class="session-item-name">${esc(s.name)}</div>
      <div class="session-item-preview">${esc(s.lastMessage || 'No messages')}</div>
      <div class="session-item-meta">
        <span>${s.messageCount} msgs</span>
        <span>${s.tokensUsed} tokens</span>
      </div>
      <button class="delete-btn" onclick="event.stopPropagation(); deleteSession('${s.id}')" title="Delete">✕</button>
    </div>
  `).join('');
}

async function selectSession(id) {
  currentSessionId = id;
  renderSessions();

  const session = sessions.find(s => s.id === id);
  document.getElementById('chatTitle').textContent = session?.name || 'Mach6';

  try {
    const res = await fetch(API + `/api/sessions/${id}/messages`);
    const messages = await res.json();
    renderMessages(messages);
    document.getElementById('statusMessages').textContent = `${messages.length} messages`;
  } catch (e) {
    console.error('Failed to load messages:', e);
  }
}

async function deleteSession(id) {
  await fetch(API + `/api/sessions/${id}`, { method: 'DELETE' });
  sessions = sessions.filter(s => s.id !== id);
  if (currentSessionId === id) {
    currentSessionId = sessions.length > 0 ? sessions[0].id : null;
    if (currentSessionId) selectSession(currentSessionId);
    else {
      document.getElementById('messages').innerHTML = `
        <div class="empty-state"><div class="empty-state-icon">⚡</div>
        <div class="empty-state-text">No sessions</div>
        <div class="empty-state-hint">Create a new session to begin</div></div>`;
    }
  }
  renderSessions();
}

function openNewSession() {
  document.getElementById('newSessionModal').classList.add('open');
  document.getElementById('newSessionName').focus();
}

function closeNewSession() {
  document.getElementById('newSessionModal').classList.remove('open');
}

async function createSession() {
  const name = document.getElementById('newSessionName').value.trim();
  const systemPrompt = document.getElementById('newSessionPrompt').value.trim();

  const res = await fetch(API + '/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name || undefined, systemPrompt: systemPrompt || undefined }),
  });
  const session = await res.json();
  sessions.unshift({
    id: session.id,
    name: session.name,
    messageCount: session.messages.length,
    lastMessage: '',
    tokensUsed: 0,
    createdAt: session.createdAt,
    updatedAt: session.updatedAt,
  });
  closeNewSession();
  document.getElementById('newSessionName').value = '';
  document.getElementById('newSessionPrompt').value = '';
  selectSession(session.id);
  renderSessions();
}

// ── Messages ───────────────────────────────────────────────────
function renderMessages(messages) {
  const el = document.getElementById('messages');
  if (messages.length === 0) {
    el.innerHTML = `<div class="empty-state" id="emptyState">
      <div class="empty-state-icon">⚡</div>
      <div class="empty-state-text">Welcome to Mach6</div>
      <div class="empty-state-hint">Start typing to begin a conversation</div></div>`;
    return;
  }
  el.innerHTML = messages.map(renderMessage).join('');
  el.scrollTop = el.scrollHeight;
}

function renderMessage(msg) {
  const meta = [];
  if (msg.tokensIn) meta.push(`${msg.tokensIn} in`);
  if (msg.tokensOut) meta.push(`${msg.tokensOut} out`);
  if (msg.latencyMs) meta.push(`${(msg.latencyMs / 1000).toFixed(1)}s`);

  let toolHtml = '';
  if (msg.toolCalls) {
    toolHtml = msg.toolCalls.map(tc => renderToolCall(tc)).join('');
  }

  return `<div class="message" data-id="${msg.id}">
    <div class="message-wrapper">
      <div class="message-header">
        <span class="message-role ${msg.role}">${msg.role}</span>
        ${meta.length > 0 ? `<span class="message-meta">${meta.join(' · ')}</span>` : ''}
      </div>
      ${toolHtml}
      <div class="message-content">${renderMarkdown(msg.content)}</div>
    </div>
  </div>`;
}

function renderToolCall(tc) {
  const statusClass = tc.status;
  const statusIcon = tc.status === 'running' ? '<span class="spinner"></span>'
    : tc.status === 'done' ? '✓' : '✕';
  const durationMs = tc.finishedAt && tc.startedAt ? tc.finishedAt - tc.startedAt : null;

  // Determine card type
  const isExec = tc.name === 'exec';
  const isRead = tc.name === 'read' || tc.name === 'write';
  const isFetch = tc.name === 'web_fetch';

  if (isExec && tc.status !== 'running') {
    return `<div class="gen-card gen-card-exec ${tc.status === 'error' ? 'error' : ''}">
      <div class="gen-card-header">
        <span>${tc.status === 'done' ? '●' : '●'}</span>
        <span style="font-family:var(--font-mono);font-size:12px">exec</span>
        ${durationMs ? `<span style="margin-left:auto;font-size:11px;color:var(--text-tertiary)">${durationMs}ms</span>` : ''}
      </div>
      <div class="gen-card-body">${esc(tc.output || '')}</div>
    </div>`;
  }

  if (isRead && tc.output && tc.status === 'done') {
    let parsed = {};
    try { parsed = JSON.parse(tc.input); } catch {}
    return `<div class="gen-card gen-card-file">
      <div class="gen-card-header">
        <span>📄</span>
        <span style="font-family:var(--font-mono);font-size:12px">${esc(parsed.path || tc.name)}</span>
        ${durationMs ? `<span style="margin-left:auto;font-size:11px;color:var(--text-tertiary)">${durationMs}ms</span>` : ''}
      </div>
      <div class="gen-card-body">${esc(tc.output.slice(0, 500))}${tc.output.length > 500 ? '\n...' : ''}</div>
    </div>`;
  }

  // Generic tool call
  return `<div class="tool-call" onclick="this.classList.toggle('expanded')">
    <div class="tool-call-header">
      <span class="tool-call-icon">${tc.status === 'running' ? '<span class="spinner"></span>' : '⚡'}</span>
      <span class="tool-call-name">${esc(tc.name)}</span>
      <span class="tool-call-status ${statusClass}">${statusIcon} ${tc.status}${durationMs ? ` · ${durationMs}ms` : ''}</span>
    </div>
    <div class="tool-call-body">
      <div class="tool-call-label">Input</div>
      <pre>${esc(tc.input)}</pre>
      ${tc.output ? `<div class="tool-call-output"><div class="tool-call-label">Output</div><pre>${esc(tc.output)}</pre></div>` : ''}
    </div>
  </div>`;
}

// ── Markdown Renderer ──────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';

  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${esc(code.trim())}</code>${lang ? `<span class="code-lang">${esc(lang)}</span>` : ''}</pre>`;
  });

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold + Italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // HR
  text = text.replace(/^---$/gm, '<hr>');

  // Lists
  text = text.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  text = text.replace(/^- (.+)$/gm, '<li>$1</li>');

  // Wrap consecutive <li> in <ul>
  text = text.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs
  text = text.replace(/\n\n/g, '</p><p>');
  text = '<p>' + text + '</p>';

  // Clean up empty paragraphs
  text = text.replace(/<p>\s*<\/p>/g, '');
  text = text.replace(/<p>(<h[123]>)/g, '$1');
  text = text.replace(/(<\/h[123]>)<\/p>/g, '$1');
  text = text.replace(/<p>(<pre>)/g, '$1');
  text = text.replace(/(<\/pre>)<\/p>/g, '$1');
  text = text.replace(/<p>(<ul>)/g, '$1');
  text = text.replace(/(<\/ul>)<\/p>/g, '$1');
  text = text.replace(/<p>(<blockquote>)/g, '$1');
  text = text.replace(/(<\/blockquote>)<\/p>/g, '$1');
  text = text.replace(/<p>(<hr>)/g, '$1');

  return text;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Send Message ───────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isStreaming || !currentSessionId) return;

  input.value = '';
  autoResize(input);
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  // Add user message to UI immediately
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.remove();

  messagesEl.innerHTML += renderMessage({ id: 'temp-user', role: 'user', content: text, timestamp: Date.now() });

  // Add streaming assistant placeholder
  const assistantId = 'streaming-' + Date.now();
  messagesEl.innerHTML += `<div class="message" data-id="${assistantId}">
    <div class="message-wrapper">
      <div class="message-header">
        <span class="message-role assistant">assistant</span>
        <span class="message-meta" id="streamMeta"></span>
      </div>
      <div id="streamToolCalls"></div>
      <div class="message-content" id="streamContent"><span class="streaming-cursor"></span></div>
    </div>
  </div>`;
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const res = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: currentSessionId, message: text }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));

          if (data.type === 'text') {
            fullContent += data.content;
            const contentEl = document.getElementById('streamContent');
            if (contentEl) {
              contentEl.innerHTML = renderMarkdown(fullContent) + '<span class="streaming-cursor"></span>';
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }

          if (data.type === 'tool_start') {
            const tcEl = document.getElementById('streamToolCalls');
            if (tcEl) tcEl.innerHTML += renderToolCall(data.toolCall);
          }

          if (data.type === 'tool_end') {
            const tcEl = document.getElementById('streamToolCalls');
            if (tcEl) {
              // Re-render all tool calls properly
              // For simplicity, just update the whole area
            }
          }

          if (data.type === 'done') {
            const contentEl = document.getElementById('streamContent');
            if (contentEl) contentEl.innerHTML = renderMarkdown(fullContent);

            const metaEl = document.getElementById('streamMeta');
            if (metaEl && data.message) {
              const m = data.message;
              const parts = [];
              if (m.tokensIn) parts.push(`${m.tokensIn} in`);
              if (m.tokensOut) parts.push(`${m.tokensOut} out`);
              if (m.latencyMs) parts.push(`${(m.latencyMs / 1000).toFixed(1)}s`);
              metaEl.textContent = parts.join(' · ');
            }

            // Update session list
            const sidx = sessions.findIndex(s => s.id === currentSessionId);
            if (sidx >= 0) {
              sessions[sidx].messageCount += 2;
              sessions[sidx].lastMessage = fullContent.slice(0, 100);
              if (data.message) sessions[sidx].tokensUsed += (data.message.tokensIn || 0) + (data.message.tokensOut || 0);
              renderSessions();
            }
            document.getElementById('statusMessages').textContent = `${sessions[sidx]?.messageCount || 0} messages`;
          }
        } catch (e) { /* skip malformed */ }
      }
    }
  } catch (e) {
    console.error('Stream error:', e);
    const contentEl = document.getElementById('streamContent');
    if (contentEl) contentEl.innerHTML = `<span style="color:var(--red)">Error: ${esc(e.message)}</span>`;
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ── Config Panel ───────────────────────────────────────────────
function openConfig() {
  document.getElementById('configPanel').classList.add('open');
  document.getElementById('configOverlay').classList.add('open');
  renderConfigTab('config');
}

function closeConfig() {
  document.getElementById('configPanel').classList.remove('open');
  document.getElementById('configOverlay').classList.remove('open');
}

function switchConfigTab(tab, btn) {
  document.querySelectorAll('.config-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderConfigTab(tab);
}

async function renderConfigTab(tab) {
  const body = document.getElementById('configBody');

  if (tab === 'config') {
    const providerOptions = providers.map(p =>
      `<option value="${p.id}" ${p.id === configData.provider ? 'selected' : ''}>${p.name}</option>`
    ).join('');

    body.innerHTML = `
      <div class="config-section">
        <div class="config-section-title">Model Configuration</div>
        <div class="config-field">
          <label class="config-label">Provider</label>
          <select class="config-select" id="cfgProvider">${providerOptions}</select>
        </div>
        <div class="config-field">
          <label class="config-label">Model</label>
          <input class="config-input" id="cfgModel" value="${esc(configData.model || '')}" placeholder="claude-sonnet-4-20250514" />
        </div>
        <div class="config-field">
          <label class="config-label">Temperature</label>
          <input type="range" class="config-slider" id="cfgTemp" min="0" max="2" step="0.1"
            value="${configData.temperature ?? 0.7}" oninput="document.getElementById('cfgTempVal').textContent = this.value" />
          <div class="slider-value" id="cfgTempVal">${configData.temperature ?? 0.7}</div>
        </div>
        <div class="config-field">
          <label class="config-label">Max Tokens</label>
          <input class="config-input" id="cfgMaxTokens" type="number" value="${configData.maxTokens || 8192}" />
        </div>
      </div>
      <div class="config-section">
        <div class="config-section-title">API Keys</div>
        ${providers.map(p => `
          <div class="config-field">
            <label class="config-label">${esc(p.name)}</label>
            <div class="key-field">
              <input class="config-input" id="cfgKey_${p.id}" type="password"
                value="${esc((configData.apiKeys && configData.apiKeys[p.id]) || '')}" placeholder="Enter API key..." />
              <button class="key-toggle" onclick="toggleKey('cfgKey_${p.id}', this)">show</button>
            </div>
          </div>
        `).join('')}
      </div>
      <button class="save-btn" onclick="saveConfig()">Save Configuration</button>
    `;
  } else if (tab === 'agents') {
    try {
      const res = await fetch(API + '/api/agents');
      agents = await res.json();
    } catch { agents = []; }

    body.innerHTML = `
      <div class="config-section">
        <div class="config-section-title">Running Sub-Agents</div>
        ${agents.length === 0 ? '<div style="color:var(--text-tertiary);font-size:13px">No active sub-agents</div>' :
          agents.map(a => `
            <div class="agent-item">
              <div class="agent-info">
                <div class="agent-label">${esc(a.label)}</div>
                <div class="agent-status">${a.status} · started ${new Date(a.startedAt).toLocaleTimeString()}</div>
              </div>
              ${a.status === 'running' ? `<button class="kill-btn" onclick="killAgent('${a.id}')">Kill</button>` : ''}
            </div>
          `).join('')}
      </div>
    `;
  } else if (tab === 'tools') {
    body.innerHTML = `
      <div class="config-section">
        <div class="config-section-title">Available Tools</div>
        ${tools.map(t => `
          <div style="padding:8px 12px;background:var(--bg-secondary);border-radius:var(--radius);margin-bottom:6px;display:flex;align-items:center;gap:10px">
            <span style="font-size:14px">⚡</span>
            <div>
              <div style="font-family:var(--font-mono);font-size:13px;font-weight:500">${esc(t.name)}</div>
              <div style="font-size:12px;color:var(--text-tertiary)">${esc(t.description)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
}

function toggleKey(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'hide';
  } else {
    input.type = 'password';
    btn.textContent = 'show';
  }
}

async function saveConfig() {
  const update = {
    provider: document.getElementById('cfgProvider').value,
    model: document.getElementById('cfgModel').value,
    temperature: parseFloat(document.getElementById('cfgTemp').value),
    maxTokens: parseInt(document.getElementById('cfgMaxTokens').value),
    apiKeys: {},
  };

  providers.forEach(p => {
    const val = document.getElementById('cfgKey_' + p.id)?.value;
    if (val) update.apiKeys[p.id] = val;
  });

  await fetch(API + '/api/config', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(update),
  });

  configData = { ...configData, ...update };
  document.getElementById('statusModel').textContent = update.model;
  closeConfig();
}

async function killAgent(id) {
  await fetch(API + `/api/agents/${id}`, { method: 'DELETE' });
  renderConfigTab('agents');
}

// ── Boot ───────────────────────────────────────────────────────
init();
</script>
</body>
</html>
