<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Symbiote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void: #08080c;
  --surface-0: #0c0c12;
  --surface-1: #12121a;
  --surface-2: #1a1a24;
  --surface-3: #22222e;
  --surface-4: #2a2a38;
  --text-primary: #e8e8ef;
  --text-secondary: #9898a8;
  --text-tertiary: #68687a;
  --text-ghost: #484858;
  --accent: #7c6aff;
  --accent-soft: rgba(124, 106, 255, 0.12);
  --accent-glow: rgba(124, 106, 255, 0.25);
  --accent-bright: #9d8fff;
  --green: #34d399;
  --green-soft: rgba(52, 211, 153, 0.12);
  --amber: #fbbf24;
  --red: #f87171;
  --glass: rgba(18, 18, 26, 0.8);
  --glass-border: rgba(255, 255, 255, 0.06);
  --glass-hover: rgba(255, 255, 255, 0.03);
  --sidebar-w: 280px;
  --header-h: 56px;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: 'Inter', -apple-system, sans-serif;
  background: var(--void); color: var(--text-primary);
  -webkit-font-smoothing: antialiased; overflow: hidden;
}
::selection { background: var(--accent-soft); color: var(--accent-bright); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

.app { display: flex; height: 100vh; position: relative; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w); background: var(--surface-0);
  border-right: 1px solid var(--glass-border);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: transform var(--transition-slow); z-index: 100;
}
.sidebar-header {
  height: var(--header-h); padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--glass-border);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: white;
  box-shadow: 0 0 20px var(--accent-glow);
}
.brand-text { font-weight: 600; font-size: 15px; letter-spacing: 0.5px; }
.brand-version {
  font-size: 10px; font-weight: 500; color: var(--text-tertiary);
  background: var(--surface-3); padding: 2px 6px; border-radius: 4px;
}
.new-chat-btn {
  margin: 12px 16px; width: calc(100% - 32px); padding: 10px 14px;
  background: var(--accent-soft); border: 1px solid rgba(124, 106, 255, 0.2);
  border-radius: var(--radius-sm); color: var(--accent-bright);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: all var(--transition);
}
.new-chat-btn:hover {
  background: rgba(124, 106, 255, 0.18);
  border-color: rgba(124, 106, 255, 0.35); transform: translateY(-1px);
}
.new-chat-btn svg { width: 16px; height: 16px; }
.session-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.session-group-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-ghost); padding: 12px 12px 6px;
}
.session-item {
  display: flex; align-items: center; padding: 10px 12px;
  border-radius: var(--radius-sm); cursor: pointer;
  transition: all var(--transition); gap: 10px; margin-bottom: 2px;
}
.session-item:hover { background: var(--glass-hover); }
.session-item.active { background: var(--surface-3); }
.session-icon {
  width: 32px; height: 32px; border-radius: var(--radius-xs);
  background: var(--surface-3); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; color: var(--text-tertiary);
}
.session-item.active .session-icon { background: var(--accent-soft); color: var(--accent-bright); }
.session-info { flex: 1; min-width: 0; }
.session-title {
  font-size: 13px; font-weight: 500; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-preview {
  font-size: 11px; color: var(--text-tertiary); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-delete {
  opacity: 0; background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; padding: 4px; border-radius: 4px; transition: all var(--transition);
}
.session-item:hover .session-delete { opacity: 1; }
.session-delete:hover { color: var(--red); background: rgba(248, 113, 113, 0.1); }
.sidebar-footer {
  padding: 12px 16px; border-top: 1px solid var(--glass-border);
  display: flex; flex-direction: column; gap: 6px;
}
.sidebar-footer-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-tertiary); padding: 6px 8px;
  border-radius: var(--radius-xs);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.offline { background: var(--red); }

.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 99;
}

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.reconnect-bar {
  display: none; padding: 8px 16px;
  background: rgba(251, 191, 36, 0.1); border-bottom: 1px solid rgba(251, 191, 36, 0.2);
  color: var(--amber); font-size: 12px; text-align: center;
  align-items: center; justify-content: center; gap: 8px;
}
.reconnect-bar.visible { display: flex; }

.header {
  height: var(--header-h); padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--glass-border);
  background: var(--glass); backdrop-filter: blur(12px); z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.menu-btn {
  display: none; background: none; border: none;
  color: var(--text-secondary); cursor: pointer; padding: 6px; border-radius: var(--radius-xs);
}
.menu-btn:hover { background: var(--surface-3); }
.menu-btn svg { width: 20px; height: 20px; }
.agent-badge { display: flex; align-items: center; gap: 8px; }
.agent-avatar {
  width: 30px; height: 30px; border-radius: var(--radius-xs);
  background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; color: white;
}
.agent-name { font-weight: 600; font-size: 14px; }
.agent-model {
  font-size: 11px; color: var(--text-tertiary);
  font-family: 'JetBrains Mono', monospace;
  background: var(--surface-2); padding: 2px 8px; border-radius: 4px;
}
.header-right { display: flex; align-items: center; gap: 8px; }
.header-btn {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; padding: 8px; border-radius: var(--radius-xs);
  transition: all var(--transition); display: flex; align-items: center;
}
.header-btn:hover { background: var(--surface-3); color: var(--text-secondary); }
.header-btn svg { width: 18px; height: 18px; }
.latency-badge {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--green); background: var(--green-soft);
  padding: 3px 8px; border-radius: 4px; font-weight: 500;
}

/* ── Chat ── */
.chat-area { flex: 1; overflow-y: auto; padding: 24px 0; scroll-behavior: smooth; }
.chat-container { max-width: 780px; margin: 0 auto; padding: 0 24px; }

.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 24px; text-align: center;
}
.welcome-orb {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 50%, #7c3aed 100%);
  margin-bottom: 24px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(124, 106, 255, 0.1);
  animation: orbPulse 4s ease-in-out infinite; position: relative;
}
.welcome-orb::after {
  content: ''; position: absolute; inset: -2px; border-radius: 22px;
  background: linear-gradient(135deg, var(--accent) 0%, transparent 50%, #7c3aed 100%);
  opacity: 0.4; filter: blur(8px); z-index: -1;
}
.welcome-orb svg { width: 32px; height: 32px; color: white; }
@keyframes orbPulse {
  0%, 100% { box-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(124, 106, 255, 0.1); }
  50% { box-shadow: 0 0 50px var(--accent-glow), 0 0 100px rgba(124, 106, 255, 0.15); transform: scale(1.02); }
}
.welcome h1 {
  font-size: 22px; font-weight: 600; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-bright) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.welcome p { font-size: 14px; color: var(--text-secondary); max-width: 400px; line-height: 1.6; }
.suggestions {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-top: 32px; max-width: 520px; width: 100%;
}
.suggestion {
  padding: 14px 16px; background: var(--surface-1);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  color: var(--text-secondary); font-size: 13px; font-family: inherit;
  cursor: pointer; text-align: left; transition: all var(--transition); line-height: 1.4;
}
.suggestion:hover {
  background: var(--surface-2); border-color: rgba(124, 106, 255, 0.2);
  color: var(--text-primary); transform: translateY(-2px);
}
.suggestion-icon { font-size: 16px; margin-bottom: 6px; display: block; }

.message { margin-bottom: 4px; animation: msgIn 0.3s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message-wrapper { max-width: 100%; }
.message-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 16px 0 0;
}
.message-role { font-size: 13px; font-weight: 600; }
.message-role.user { color: var(--text-primary); }
.message-role.assistant { color: var(--accent-bright); }
.message-time { font-size: 10px; color: var(--text-ghost); font-family: 'JetBrains Mono', monospace; }
.message-body {
  font-size: 14px; line-height: 1.7; color: var(--text-primary);
  padding: 0 0 12px; border-bottom: 1px solid var(--glass-border);
}
.message-body p { margin-bottom: 10px; }
.message-body p:last-child { margin-bottom: 0; }
.message-body strong { font-weight: 600; }
.message-body em { color: var(--text-secondary); }
.message-body a {
  color: var(--accent-bright); text-decoration: none;
  border-bottom: 1px solid rgba(124, 106, 255, 0.3); transition: border-color var(--transition);
}
.message-body a:hover { border-color: var(--accent-bright); }
.message-body ul, .message-body ol { padding-left: 20px; margin: 8px 0; }
.message-body li { margin-bottom: 4px; }
.message-body pre {
  background: var(--surface-1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 14px 16px;
  overflow-x: auto; margin: 12px 0; position: relative;
}
.message-body code { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6; }
.message-body p code {
  background: var(--surface-2); padding: 2px 6px; border-radius: 4px;
  font-size: 12px; color: var(--accent-bright);
}
.code-lang {
  position: absolute; top: 8px; right: 10px;
  font-size: 10px; color: var(--text-ghost);
  font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
}
.copy-btn {
  position: absolute; top: 8px; right: 10px;
  background: var(--surface-3); border: none; color: var(--text-tertiary);
  cursor: pointer; padding: 4px 8px; border-radius: 4px;
  font-size: 11px; font-family: inherit; opacity: 0; transition: all var(--transition);
}
.message-body pre:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--surface-4); color: var(--text-primary); }
.message-body table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
.message-body th, .message-body td {
  padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--glass-border);
}
.message-body th {
  font-weight: 600; color: var(--text-secondary);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
}
.message-body blockquote {
  border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0;
  color: var(--text-secondary); background: var(--accent-soft);
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
}
.streaming-indicator {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; color: var(--text-tertiary); font-size: 13px;
}
.streaming-dots { display: flex; gap: 4px; }
.streaming-dots span {
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  animation: dotBounce 1.4s ease-in-out infinite;
}
.streaming-dots span:nth-child(2) { animation-delay: 0.2s; }
.streaming-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ── Input ── */
.input-area { padding: 16px 24px 20px; background: linear-gradient(to top, var(--surface-0) 0%, transparent 100%); }
.input-container { max-width: 780px; margin: 0 auto; }
.input-row {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--surface-1); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 6px 6px 6px 16px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.input-row:focus-within {
  border-color: rgba(124, 106, 255, 0.4);
  box-shadow: 0 0 0 3px var(--accent-soft), 0 4px 20px rgba(0,0,0,0.3);
}
.input-row textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text-primary); font-family: inherit; font-size: 14px;
  line-height: 1.5; resize: none; min-height: 24px; max-height: 160px; padding: 8px 0;
}
.input-row textarea::placeholder { color: var(--text-ghost); }
.send-btn {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: var(--accent); border: none; color: white;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all var(--transition);
}
.send-btn:hover { background: var(--accent-bright); transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; background: var(--surface-4); }
.send-btn svg { width: 18px; height: 18px; }
.input-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px; padding: 0 4px;
}
.input-hint { font-size: 11px; color: var(--text-ghost); }
.input-hint kbd {
  background: var(--surface-3); padding: 1px 5px; border-radius: 3px;
  font-family: inherit; font-size: 10px;
}
.powered-by { font-size: 10px; color: var(--text-ghost); display: flex; align-items: center; gap: 4px; }
.powered-by a { color: var(--text-tertiary); text-decoration: none; transition: color var(--transition); }
.powered-by a:hover { color: var(--accent-bright); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .overlay.visible { display: block; }
  .menu-btn { display: flex; }
  .suggestions { grid-template-columns: 1fr; }
  .chat-container { padding: 0 16px; }
  .input-area { padding: 12px 16px 16px; }
  .header { padding: 0 12px; }
  .agent-model { display: none; }
}
@media (max-width: 480px) { :root { --sidebar-w: 100vw; } .welcome h1 { font-size: 18px; } }
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-mark">M6</div>
        <span class="brand-text">Symbiote</span>
        <span class="brand-version" id="versionBadge"></span>
      </div>
    </div>
    <button class="new-chat-btn" onclick="createSession()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-footer-item">
        <span class="status-dot" id="footerStatus"></span>
        <span id="footerStatusText">Connecting...</span>
      </div>
      <div class="sidebar-footer-item" style="color:var(--text-ghost);font-size:11px;">
        Powered by <a href="https://github.com/Artifact-Virtual/symbiote" target="_blank" style="color:var(--text-tertiary);text-decoration:none;">Artifact Virtual</a>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="reconnect-bar" id="reconnectBar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="reconnectText">Reconnecting...</span>
    </div>
    <header class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="agent-badge">
          <div class="agent-avatar" id="agentAvatar">A</div>
          <span class="agent-name" id="agentName">Agent</span>
        </div>
        <span class="agent-model" id="agentModel"></span>
      </div>
      <div class="header-right">
        <span class="latency-badge" id="latencyBadge" style="display:none"></span>
        <button class="header-btn" onclick="clearChat()" title="Clear chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </header>
    <div class="chat-area" id="chatArea">
      <div class="chat-container" id="chatContainer"></div>
    </div>
    <div class="input-area">
      <div class="input-container">
        <div class="input-row">
          <textarea id="messageInput" placeholder="Send a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="input-hint"><kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
          <span class="powered-by">Symbiote by <a href="https://artifactvirtual.com" target="_blank">Artifact Virtual</a></span>
        </div>
      </div>
    </div>
  </main>
</div>
<script>
var API_BASE = window.location.origin;
var agentName = 'Agent', agentInitial = 'A', providerInfo = '';
var isStreaming = false, retryDelay = 3000, retryTimer = null;

function loadSessions() { try { return JSON.parse(localStorage.getItem('symbiote_sessions') || '[]'); } catch { return []; } }
function saveSessions(s) { localStorage.setItem('symbiote_sessions', JSON.stringify(s)); }
function getActiveId() { return localStorage.getItem('symbiote_active_session') || ''; }
function setActiveId(id) { localStorage.setItem('symbiote_active_session', id); }
function getMessages(sid) { try { return JSON.parse(localStorage.getItem('symbiote_msg_' + sid) || '[]'); } catch { return []; } }
function saveMessages(sid, msgs) { localStorage.setItem('symbiote_msg_' + sid, JSON.stringify(msgs)); }

function createSession() {
  var id = 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
  var sessions = loadSessions();
  sessions.unshift({ id: id, title: 'New conversation', created: Date.now(), preview: '' });
  saveSessions(sessions); setActiveId(id); renderSessions(); renderChat();
  document.getElementById('messageInput').focus();
}
function deleteSession(id, e) {
  if (e) e.stopPropagation();
  var sessions = loadSessions().filter(function(s) { return s.id !== id; });
  saveSessions(sessions); localStorage.removeItem('symbiote_msg_' + id);
  if (getActiveId() === id) { if (sessions.length > 0) setActiveId(sessions[0].id); else { createSession(); return; } }
  renderSessions(); renderChat();
}
function switchSession(id) {
  setActiveId(id); renderSessions(); renderChat();
  if (window.innerWidth <= 768) toggleSidebar();
}
function updateSessionPreview(sid, text) {
  var sessions = loadSessions();
  for (var i = 0; i < sessions.length; i++) {
    if (sessions[i].id === sid) {
      sessions[i].preview = text.substring(0, 80);
      if (sessions[i].title === 'New conversation' && text.length > 0) sessions[i].title = text.substring(0, 50);
      break;
    }
  }
  saveSessions(sessions); renderSessions();
}

function renderSessions() {
  var list = document.getElementById('sessionList');
  var sessions = loadSessions(), activeId = getActiveId();
  if (sessions.length === 0) { list.innerHTML = '<div style="padding:24px 16px;text-align:center;color:var(--text-ghost);font-size:12px;">No conversations yet</div>'; return; }
  var today = [], week = [], older = [], now = Date.now(), dayMs = 86400000;
  sessions.forEach(function(s) { var age = now - s.created; if (age < dayMs) today.push(s); else if (age < dayMs * 7) week.push(s); else older.push(s); });
  function renderGroup(label, items) {
    if (items.length === 0) return '';
    var h = '<div class="session-group-label">' + label + '</div>';
    items.forEach(function(s) {
      var active = s.id === activeId ? ' active' : '';
      h += '<div class="session-item' + active + '" onclick="switchSession(\'' + s.id + '\')">';
      h += '<div class="session-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>';
      h += '<div class="session-info"><div class="session-title">' + escapeHtml(s.title) + '</div>';
      if (s.preview) h += '<div class="session-preview">' + escapeHtml(s.preview) + '</div>';
      h += '</div><button class="session-delete" onclick="deleteSession(\'' + s.id + '\', event)" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
    });
    return h;
  }
  list.innerHTML = renderGroup('Today', today) + renderGroup('This week', week) + renderGroup('Older', older);
}

function renderChat() {
  var container = document.getElementById('chatContainer'), sid = getActiveId(), msgs = getMessages(sid);
  if (msgs.length === 0) { container.innerHTML = renderWelcome(); return; }
  var html = '';
  msgs.forEach(function(m) { html += renderMessage(m.role, m.content, m.time); });
  container.innerHTML = html; scrollToBottom();
}
function renderWelcome() {
  return '<div class="welcome"><div class="welcome-orb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>' +
    '<h1>How can I help you today?</h1><p>I\'m ' + agentName + ', your AI assistant powered by Symbiote. Ask me anything.</p>' +
    '<div class="suggestions">' +
    '<button class="suggestion" onclick="useSuggestion(this)"><span class="suggestion-icon">&#9758;</span>What can you help me with?</button>' +
    '<button class="suggestion" onclick="useSuggestion(this)"><span class="suggestion-icon">&#9881;</span>Tell me about your capabilities</button>' +
    '<button class="suggestion" onclick="useSuggestion(this)"><span class="suggestion-icon">&#9733;</span>What makes you different?</button>' +
    '<button class="suggestion" onclick="useSuggestion(this)"><span class="suggestion-icon">&#128269;</span>Help me with research</button></div></div>';
}
function useSuggestion(el) { document.getElementById('messageInput').value = el.textContent.replace(/^[^\w]+/, '').trim(); sendMessage(); }

function renderMessage(role, content, time) {
  var timeStr = time ? new Date(time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  var roleName = role === 'user' ? 'You' : agentName;
  return '<div class="message"><div class="message-wrapper"><div class="message-header">' +
    '<span class="message-role ' + role + '">' + roleName + '</span>' +
    (timeStr ? '<span class="message-time">' + timeStr + '</span>' : '') +
    '</div><div class="message-body">' + formatMarkdown(content) + '</div></div></div>';
}

function formatMarkdown(text) {
  if (!text) return '';
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code>' + escapeHtml(code.trim()) + '</code>' + (lang ? '<span class="code-lang">' + lang + '</span>' : '') + '<button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>';
  });
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  text = text.replace(/^\|(.+)\|\s*\n\|[\s\-:|]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, function(m, header, body) {
    var ths = header.split('|').filter(Boolean).map(function(h){ return '<th>'+h.trim()+'</th>'; }).join('');
    var rows = body.trim().split('\n').map(function(r){ var tds = r.split('|').filter(Boolean).map(function(d){ return '<td>'+d.trim()+'</td>'; }).join(''); return '<tr>'+tds+'</tr>'; }).join('');
    return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';
  });
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  text = text.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/\n\n/g, '</p><p>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p>\s*<(h[234]|pre|ul|ol|table|blockquote)/g, '<$1');
  text = text.replace(/<\/(h[234]|pre|ul|ol|table|blockquote)>\s*<\/p>/g, '</$1>');
  return text;
}
function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function copyCode(btn) {
  var code = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(function() { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 2000); });
}

function sendMessage() {
  var input = document.getElementById('messageInput'), text = input.value.trim();
  if (!text || isStreaming) return;
  var sid = getActiveId();
  if (!sid) { createSession(); sid = getActiveId(); }
  var msgs = getMessages(sid);
  msgs.push({ role: 'user', content: text, time: Date.now() });
  saveMessages(sid, msgs); updateSessionPreview(sid, text);
  var container = document.getElementById('chatContainer');
  var welcome = container.querySelector('.welcome');
  if (welcome) container.innerHTML = '';
  container.insertAdjacentHTML('beforeend', renderMessage('user', text, Date.now()));
  var thinkingId = 'thinking_' + Date.now();
  container.insertAdjacentHTML('beforeend',
    '<div id="' + thinkingId + '" class="message"><div class="message-wrapper">' +
    '<div class="message-header"><span class="message-role assistant">' + agentName + '</span></div>' +
    '<div class="streaming-indicator"><div class="streaming-dots"><span></span><span></span><span></span></div>Thinking...</div></div></div>');
  scrollToBottom();
  input.value = ''; autoResize(input); isStreaming = true;
  document.getElementById('sendBtn').disabled = true;
  var startTime = Date.now();
  fetch(API_BASE + '/api/chat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: sid, message: text })
  }).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var reader = res.body.getReader(), decoder = new TextDecoder(), buffer = '', responseText = '';
    var thinkingEl = document.getElementById(thinkingId);
    function processStream() {
      return reader.read().then(function(result) {
        if (result.done) { finishResponse(sid, responseText, thinkingId, startTime); return; }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n'); buffer = lines.pop();
        lines.forEach(function(line) {
          line = line.trim();
          if (!line || !line.startsWith('data: ')) return;
          var data = line.substring(6);
          if (data === '[DONE]') return;
          try {
            var parsed = JSON.parse(data);
            var delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta;
            if (delta && delta.content) {
              responseText += delta.content;
              if (thinkingEl) {
                thinkingEl.querySelector('.message-wrapper').innerHTML =
                  '<div class="message-header"><span class="message-role assistant">' + agentName + '</span></div>' +
                  '<div class="message-body">' + formatMarkdown(responseText) + '</div>';
              }
              scrollToBottom();
            }
          } catch(e) {
            if (data && data !== '[DONE]') {
              responseText += data;
              if (thinkingEl) {
                thinkingEl.querySelector('.message-wrapper').innerHTML =
                  '<div class="message-header"><span class="message-role assistant">' + agentName + '</span></div>' +
                  '<div class="message-body">' + formatMarkdown(responseText) + '</div>';
              }
              scrollToBottom();
            }
          }
        });
        return processStream();
      });
    }
    return processStream();
  }).catch(function(err) {
    var thinkingEl = document.getElementById(thinkingId);
    if (thinkingEl) {
      thinkingEl.querySelector('.message-wrapper').innerHTML =
        '<div class="message-header"><span class="message-role assistant">' + agentName + '</span></div>' +
        '<div class="message-body" style="color:var(--red);">Failed to get response. ' + escapeHtml(err.message) + '</div>';
    }
    isStreaming = false; document.getElementById('sendBtn').disabled = false;
  });
}

function finishResponse(sid, text, thinkingId, startTime) {
  if (text) {
    var msgs = getMessages(sid);
    msgs.push({ role: 'assistant', content: text, time: Date.now() });
    saveMessages(sid, msgs); updateSessionPreview(sid, text);
  }
  var latency = Date.now() - startTime, badge = document.getElementById('latencyBadge');
  if (latency > 0) { badge.textContent = (latency / 1000).toFixed(1) + 's'; badge.style.display = 'inline-flex'; setTimeout(function() { badge.style.display = 'none'; }, 5000); }
  isStreaming = false; document.getElementById('sendBtn').disabled = false;
}

function scrollToBottom() { var area = document.getElementById('chatArea'); requestAnimationFrame(function() { area.scrollTop = area.scrollHeight; }); }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; document.getElementById('sendBtn').disabled = !el.value.trim() || isStreaming; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function clearChat() {
  var sid = getActiveId(); if (!sid) return;
  saveMessages(sid, []);
  var sessions = loadSessions();
  for (var i = 0; i < sessions.length; i++) { if (sessions[i].id === sid) { sessions[i].title = 'New conversation'; sessions[i].preview = ''; } }
  saveSessions(sessions); renderSessions(); renderChat();
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('visible'); }

function checkConnection() {
  fetch(API_BASE + '/api/config').then(function(res) { return res.json(); }).then(function(data) {
    agentName = data.agentName || 'Agent'; agentInitial = agentName.charAt(0).toUpperCase();
    providerInfo = (data.provider || '') + (data.model ? ' / ' + data.model : '');
    document.getElementById('agentName').textContent = agentName;
    document.getElementById('agentAvatar').textContent = agentInitial;
    document.getElementById('agentModel').textContent = providerInfo;
    document.getElementById('versionBadge').textContent = data.version || '';
    document.getElementById('footerStatus').className = 'status-dot online';
    document.getElementById('footerStatusText').textContent = agentName + ' \u00B7 Online';
    document.getElementById('reconnectBar').classList.remove('visible');
    retryDelay = 3000; clearTimeout(retryTimer);
    var welcome = document.querySelector('.welcome h1');
    if (welcome) welcome.textContent = 'How can I help you today?';
    var welcomeP = document.querySelector('.welcome p');
    if (welcomeP) welcomeP.textContent = "I'm " + agentName + ", your AI assistant powered by Symbiote. Ask me anything.";
  }).catch(function() {
    document.getElementById('footerStatus').className = 'status-dot offline';
    document.getElementById('footerStatusText').textContent = 'Offline';
    document.getElementById('reconnectBar').classList.add('visible');
    document.getElementById('reconnectText').textContent = 'Connection lost. Retrying in ' + Math.ceil(retryDelay / 1000) + 's...';
    retryTimer = setTimeout(function() { checkConnection(); retryDelay = Math.min(retryDelay * 1.5, 30000); }, retryDelay);
  });
}

(function init() {
  var sessions = loadSessions();
  if (sessions.length === 0) createSession();
  else if (!getActiveId()) setActiveId(sessions[0].id);
  renderSessions(); renderChat(); checkConnection();
  setInterval(checkConnection, 30000);
  document.getElementById('messageInput').focus();
})();
</script>
</body>
</html>
